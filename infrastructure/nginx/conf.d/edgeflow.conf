server {
  listen 80;
  server_name localhost edgeflow.io www.edgeflow.io;

  # ─── Security Headers ─────────────────────────────────────────────────────────
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # ─── REST API ─────────────────────────────────────────────────────────────────
  location /api {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_pass http://edgeflow_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 90s;
  }

  # ─── Auth Rate Limiting ───────────────────────────────────────────────────────
  location /api/v1/auth/login {
    limit_req zone=auth_limit burst=5 nodelay;

    proxy_pass http://edgeflow_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── WebSocket (Sticky Session via IP hash) ────────────────────────────────────
  location /ws {
    proxy_pass http://edgeflow_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;  # 24h — WebSocket connections are long-lived
    proxy_send_timeout 86400s;
    proxy_buffering off;
  }

  # ─── API Documentation ────────────────────────────────────────────────────────
  location /docs {
    proxy_pass http://edgeflow_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # ─── Health Check ─────────────────────────────────────────────────────────────
  location /health {
    proxy_pass http://edgeflow_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
  }

  # ─── Frontend (Next.js) ────────────────────────────────────────────────────────
  # Uncomment when frontend service is added to docker-compose
  # location / {
  #   proxy_pass http://web:3000;
  #   proxy_http_version 1.1;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection "upgrade";
  #   proxy_set_header Host $host;
  # }
}
